name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false   # never cancel an in-flight Pages deploy (that wedges deploy-pages)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Programmatically enable + configure Pages for the "GitHub Actions" source,
      # so the deploy step doesn't depend on the Settings→Pages toggle being exact.
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - run: npm ci
      - name: Build
        # Public config only (publishable anon key + function URL). Set these in
        # Repo → Settings → Secrets and variables → Actions.
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_FUNCTIONS_URL: ${{ secrets.VITE_FUNCTIONS_URL }}
      - name: SPA fallback (serve index.html on deep links)
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
